<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bannerPrimaryGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="bannerAccentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    
    <filter id="bannerShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bannerPrimaryGradient)"/>
  
  <!-- Icon Section (Left) -->
  <g transform="translate(200, 200)">
    <!-- Shield -->
    <path d="M 0 -100 L 80 -60 L 80 20 Q 80 80 0 120 Q -80 80 -80 20 L -80 -60 Z" 
          fill="#ffffff" opacity="0.95" filter="url(#bannerShadow)"/>
    
    <!-- Math Symbols -->
    <g transform="translate(-40, -40)">
      <rect x="-2" y="-12" width="4" height="24" fill="url(#bannerPrimaryGradient)" rx="1"/>
      <rect x="-12" y="-2" width="24" height="4" fill="url(#bannerPrimaryGradient)" rx="1"/>
    </g>
    
    <g transform="translate(40, -40) rotate(45)">
      <rect x="-2" y="-12" width="4" height="24" fill="url(#bannerAccentGradient)" rx="1"/>
      <rect x="-12" y="-2" width="24" height="4" fill="url(#bannerAccentGradient)" rx="1"/>
    </g>
    
    <!-- Trophy -->
    <g transform="translate(0, 30)">
      <path d="M -22 -20 L -22 -6 Q -22 6 -16 13 L -10 20 L 10 20 L 16 13 Q 22 6 22 -6 L 22 -20 Z" 
            fill="url(#bannerAccentGradient)"/>
      <path d="M -22 -13 Q -35 -13 -35 0 Q -35 10 -26 10" fill="none" stroke="url(#bannerAccentGradient)" stroke-width="4" stroke-linecap="round"/>
      <path d="M 22 -13 Q 35 -13 35 0 Q 35 10 26 10" fill="none" stroke="url(#bannerAccentGradient)" stroke-width="4" stroke-linecap="round"/>
      <rect x="-26" y="20" width="52" height="5" fill="url(#bannerAccentGradient)" rx="2"/>
      <rect x="-20" y="25" width="40" height="8" fill="url(#bannerAccentGradient)" rx="2"/>
      <path d="M 0 -10 L 2.5 -2 L 10 -2 L 5 2 L 6.5 10 L 0 5 L -6.5 10 L -5 2 L -10 -2 L -2.5 -2 Z" 
            fill="#ffffff" opacity="0.9"/>
    </g>
  </g>
  
  <!-- Text Section (Right) -->
  <g transform="translate(400, 0)">
    <!-- Main Title -->
    <text x="0" y="160" font-family="'Arial Black', sans-serif" font-size="110" 
          font-weight="900" fill="#ffffff" letter-spacing="3" filter="url(#bannerShadow)">
      MathMart
    </text>
    
    <!-- Subtitle -->
    <text x="0" y="220" font-family="'Arial', sans-serif" font-size="48" 
          font-weight="600" fill="#ffffff" letter-spacing="10" opacity="0.95">
      ARENA
    </text>
    
    <!-- Tagline -->
    <text x="0" y="270" font-family="'Arial', sans-serif" font-size="22" 
          font-weight="400" fill="#ffffff" letter-spacing="4" opacity="0.8">
      Competitive Math Learning Platform
    </text>
    
    <!-- Features -->
    <g transform="translate(0, 300)">
      <text x="0" y="0" font-family="'Arial', sans-serif" font-size="16" 
            font-weight="600" fill="#ffffff" opacity="0.7">
        ⚡ Real-time Challenges  •  🏆 Global Leaderboards  •  💡 Smart Hints
      </text>
    </g>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="1100" cy="100" r="8" fill="#ffffff" opacity="0.3"/>
  <circle cx="1150" cy="150" r="6" fill="#ffffff" opacity="0.25"/>
  <circle cx="1120" cy="300" r="7" fill="#ffffff" opacity="0.28"/>
</svg>
