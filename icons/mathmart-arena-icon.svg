<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconPrimaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="iconAccentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="iconSuccessGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    
    <filter id="iconShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background with rounded corners for modern app icon look -->
  <rect x="0" y="0" width="512" height="512" rx="110" fill="url(#iconPrimaryGradient)"/>
  
  <!-- Shield Shape -->
  <path d="M 256 80 L 380 140 L 380 280 Q 380 360 256 430 Q 132 360 132 280 L 132 140 Z" 
        fill="#ffffff" opacity="0.95" filter="url(#iconShadow)"/>
  
  <!-- Mathematical Symbols Arranged in Grid -->
  <!-- Plus Symbol (Top Left) -->
  <g transform="translate(180, 180)">
    <rect x="-3" y="-16" width="6" height="32" fill="url(#iconPrimaryGradient)" rx="2"/>
    <rect x="-16" y="-3" width="32" height="6" fill="url(#iconPrimaryGradient)" rx="2"/>
  </g>
  
  <!-- Multiplication Symbol (Top Right) -->
  <g transform="translate(332, 180) rotate(45)">
    <rect x="-3" y="-16" width="6" height="32" fill="url(#iconAccentGradient)" rx="2"/>
    <rect x="-16" y="-3" width="32" height="6" fill="url(#iconAccentGradient)" rx="2"/>
  </g>
  
  <!-- Trophy Icon (Center-Bottom) -->
  <g transform="translate(256, 310)" filter="url(#iconShadow)">
    <!-- Trophy Cup -->
    <path d="M -28 -24 L -28 -8 Q -28 8 -20 16 L -12 24 L 12 24 L 20 16 Q 28 8 28 -8 L 28 -24 Z" 
          fill="url(#iconAccentGradient)"/>
    <!-- Trophy Handles -->
    <path d="M -28 -16 Q -44 -16 -44 0 Q -44 12 -32 12" fill="none" stroke="url(#iconAccentGradient)" stroke-width="5" stroke-linecap="round"/>
    <path d="M 28 -16 Q 44 -16 44 0 Q 44 12 32 12" fill="none" stroke="url(#iconAccentGradient)" stroke-width="5" stroke-linecap="round"/>
    <!-- Trophy Base -->
    <rect x="-32" y="24" width="64" height="6" fill="url(#iconAccentGradient)" rx="3"/>
    <rect x="-24" y="30" width="48" height="10" fill="url(#iconAccentGradient)" rx="3"/>
    <!-- Star on Trophy -->
    <path d="M 0 -12 L 3 -3 L 13 -3 L 6 2 L 8 12 L 0 6 L -8 12 L -6 2 L -13 -3 L -3 -3 Z" 
          fill="#ffffff" opacity="0.95"/>
  </g>
  
  <!-- Text Badge at Bottom -->
  <g transform="translate(256, 420)">
    <rect x="-90" y="-20" width="180" height="40" rx="20" fill="#ffffff" opacity="0.3"/>
    <text x="0" y="8" font-family="'Arial Black', sans-serif" font-size="28" 
          font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="1">
      MATH
    </text>
  </g>
  
  <!-- Decorative Corner Elements -->
  <circle cx="100" cy="100" r="6" fill="#ffffff" opacity="0.4"/>
  <circle cx="412" cy="100" r="6" fill="#ffffff" opacity="0.4"/>
  <circle cx="100" cy="412" r="6" fill="#ffffff" opacity="0.4"/>
  <circle cx="412" cy="412" r="6" fill="#ffffff" opacity="0.4"/>
</svg>
