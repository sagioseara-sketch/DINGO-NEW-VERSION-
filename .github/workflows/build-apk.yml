name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Setup Java JDK
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Install ImageMagick
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick unzip
        
    - name: Install Gradle 8.9 (compatible with Cordova Android 12)
      run: |
        # Download and install Gradle 8.9
        cd /tmp
        wget https://services.gradle.org/distributions/gradle-8.9-bin.zip
        unzip gradle-8.9-bin.zip
        sudo mv gradle-8.9 /opt/gradle
        
        # Add to PATH
        echo "/opt/gradle/bin" >> $GITHUB_PATH
        export PATH=/opt/gradle/bin:$PATH
        
        # Verify installation
        /opt/gradle/bin/gradle --version
        
    - name: Install Cordova
      run: |
        npm install -g cordova@12.0.0
        cordova --version
        
    - name: Create Cordova project
      run: |
        cordova create mathmart com.agames.mathmart.arena "MathMart Arena"
        
    - name: Generate app icon
      run: |
        cd mathmart
        mkdir -p res/icon/android
        convert -background none ../icons/mathmart-arena-icon.svg -resize 192x192 res/icon/android/icon.png
        ls -lh res/icon/android/icon.png
        
    - name: Copy application files
      run: |
        cp index.html mathmart/www/index.html
        cp manifest.json mathmart/www/manifest.json
        cp config.xml mathmart/config.xml
        
    - name: Add Android platform
      run: |
        cd mathmart
        export PATH=/opt/gradle/bin:$PATH
        cordova platform add android@12.0.1
        
    - name: Build APK
      run: |
        cd mathmart
        export PATH=/opt/gradle/bin:$PATH
        cordova build android --debug
        
    - name: Copy APK
      run: |
        cd mathmart
        APK_PATH=$(find platforms/android/app/build/outputs/apk/debug -name "*.apk" -type f | head -n 1)
        if [ -z "$APK_PATH" ]; then
          echo "ERROR: No APK file found"
          exit 1
        fi
        cp "$APK_PATH" ../mathmart-arena.apk
        
    - name: Verify APK
      run: |
        ls -lh mathmart-arena.apk
        
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: MathMart-Arena-APK
        path: mathmart-arena.apk
        if-no-files-found: error
        
    - name: Create Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v2.0.${{ github.run_number }}
        name: MathMart Arena v2.0.${{ github.run_number }}
        body: |
          MathMart Arena Android APK - Build ${{ github.run_number }}
          
          Install on Android 5.1 or higher.
        files: mathmart-arena.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
