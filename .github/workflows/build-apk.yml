name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Setup Java JDK
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Install ImageMagick
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick
        
    - name: Install specific Cordova versions for stability
      run: |
        npm install -g cordova@12.0.0
        
    - name: Verify installations
      run: |
        cordova --version
        java -version
        node --version
        npm --version
        
    - name: Create Cordova project
      run: |
        cordova create mathmart com.agames.mathmart.arena "MathMart Arena"
        cd mathmart
        
    - name: Generate app icon
      run: |
        cd mathmart
        mkdir -p res/icon/android
        convert -background none ../icons/mathmart-arena-icon.svg -resize 192x192 res/icon/android/icon.png
        ls -lh res/icon/android/icon.png
        
    - name: Copy application files
      run: |
        cp index.html mathmart/www/index.html
        cp manifest.json mathmart/www/manifest.json
        cp config.xml mathmart/config.xml
        
    - name: Add Android platform with specific version
      run: |
        cd mathmart
        cordova platform add android@12.0.1
        
    - name: Display Android platform information
      run: |
        cd mathmart
        cordova platform ls
        
    - name: Build with increased verbosity
      run: |
        cd mathmart
        cordova build android --debug --verbose --gradleArg=--stacktrace || {
          echo "Build failed. Displaying last 100 lines of build output:"
          tail -n 100 platforms/android/app/build/outputs/logs/manifest-merger-debug-report.txt 2>/dev/null || echo "No manifest merger log found"
          exit 1
        }
        
    - name: List all generated files
      if: always()
      run: |
        cd mathmart
        find platforms/android/app/build/outputs -type f -name "*.apk" || echo "No APK files found"
        
    - name: Copy APK
      run: |
        cd mathmart
        APK_PATH=$(find platforms/android/app/build/outputs/apk/debug -name "*.apk" -type f | head -n 1)
        if [ -z "$APK_PATH" ]; then
          echo "ERROR: No APK found"
          exit 1
        fi
        cp "$APK_PATH" ../mathmart-arena.apk
        ls -lh ../mathmart-arena.apk
        
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: MathMart-Arena-APK
        path: mathmart-arena.apk
        if-no-files-found: error
        
    - name: Create Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v2.0.${{ github.run_number }}
        name: MathMart Arena v2.0.${{ github.run_number }}
        body: |
          ## MathMart Arena - Android APK
          
          Download and install mathmart-arena.apk on your Android device.
          
          **Requirements:** Android 5.1+
        files: mathmart-arena.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
