name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Node 20 ──────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── Java 17 ─────────────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Accept Android SDK licenses ──────────────────────────────
      - name: Accept Android SDK licenses
        run: |
          mkdir -p "$ANDROID_HOME/licenses"
          printf '\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n' \
            > "$ANDROID_HOME/licenses/android-sdk-license"
          printf '\n84831b9409646a918e30573bab4c9c91346d8abd\n' \
            > "$ANDROID_HOME/licenses/android-sdk-preview-license"
          printf '\nd975f751698a77b662f1254ddbeed3901e976f5a\n' \
            > "$ANDROID_HOME/licenses/intel-android-extra-license"

      # ── Install SDK platform + build tools ───────────────────────
      - name: Install Android SDK components
        run: $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      # ── Install web dependencies ─────────────────────────────────
      - name: Install npm dependencies
        run: npm install

      # ── Capacitor packages ───────────────────────────────────────
      - name: Install Capacitor packages
        run: npm install @capacitor/core@^5.7.4 @capacitor/cli@^5.7.4 @capacitor/android@^5.7.4

      # ── Vite build ───────────────────────────────────────────────
      # Must run BEFORE cap sync so dist/ is populated.
      - name: Build web app
        run: npm run build

      # ── Remove stale android folder ──────────────────────────────
      # Deleting and re-adding ensures the android project always reflects
      # the current capacitor.config.json. Keeping a stale android/ folder
      # (e.g. committed from a dev machine) can cause the WebView to load
      # an outdated index.html and show a blank screen.
      - name: Remove stale android folder
        run: rm -rf android

      # ── Add Android platform ─────────────────────────────────────
      - name: Add Android platform
        run: npx cap add android

      # ── Sync web assets into the Android project ─────────────────
      - name: Sync Capacitor
        run: npx cap sync android

      # ── Make Gradle wrapper executable ───────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── Build the debug APK ──────────────────────────────────────
      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon --stacktrace

      # ── Upload APK ───────────────────────────────────────────────
      - uses: actions/upload-artifact@v4
        with:
          name: DiNGo-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
