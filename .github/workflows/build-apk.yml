name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Setup Node 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android licenses
      run: yes | sdkmanager --licenses || true

    - name: Install Bubblewrap
      run: npm install -g @bubblewrap/cli

    - name: Generate signing keystore
      run: |
        keytool -genkeypair -v \
          -keystore mathmart.keystore \
          -alias mathmart \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass mathmart123 \
          -keypass mathmart123 \
          -dname "CN=MathMart Arena,OU=App,O=MathMart,L=India,ST=India,C=IN"
        echo "✅ Keystore created"

    - name: Init Bubblewrap TWA project
      run: |
        mkdir twa && cd twa
        bubblewrap init \
          --manifest "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/manifest.json" \
          --directory .
      env:
        BUBBLEWRAP_SKIP_UPDATE_CHECK: '1'

    - name: Patch twa-manifest for keystore
      run: |
        cd twa
        # Update signing key path in twa-manifest.json
        node - << 'JS'
        const fs = require('fs');
        const m = JSON.parse(fs.readFileSync('twa-manifest.json','utf8'));
        m.signingKey = {
          path: "../mathmart.keystore",
          alias: "mathmart"
        };
        m.signingKeyPasswords = {
          storePassword: "mathmart123",
          keyPassword: "mathmart123"
        };
        fs.writeFileSync('twa-manifest.json', JSON.stringify(m, null, 2));
        console.log('✅ twa-manifest.json updated');
        JS

    - name: Build APK
      run: |
        cd twa
        bubblewrap build \
          --skipPwaValidation \
          --keystorePath ../mathmart.keystore \
          --keystorePassword mathmart123 \
          --keyAlias mathmart \
          --keyPassword mathmart123
      env:
        BUBBLEWRAP_SKIP_UPDATE_CHECK: '1'

    - name: Locate and copy APK
      run: |
        echo "=== Searching for APK ==="
        find . -name "*.apk" 2>/dev/null || echo "No APK found yet"
        APK=$(find . -name "*.apk" | head -1)
        if [ -n "$APK" ]; then
          cp "$APK" MathMart-Arena.apk
          echo "✅ APK size: $(du -sh MathMart-Arena.apk)"
        else
          echo "❌ Build may have failed - check logs above"
          exit 1
        fi

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: MathMart-Arena-APK
        path: MathMart-Arena.apk
        retention-days: 30
