<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      width=device-width, initial-scale=1.0 is required.
      maximum-scale=1.0, user-scalable=no prevents iOS/Android auto-zoom on input focus.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!--
      Content Security Policy — allows Firebase (*.googleapis.com, *.firebaseio.com),
      Google Fonts, and the app's own scripts/styles.
      'unsafe-eval' is required by Firebase SDK internals.
      'unsafe-inline' is required by our inline styles (React style prop).
      connect-src includes wss: for Firebase Realtime Database WebSocket connections.
    -->
    <meta http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.firebaseapp.com https://*.googleapis.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: blob: https:;
        connect-src 'self'
          https://*.googleapis.com
          https://*.firebaseio.com
          wss://*.firebaseio.com
          https://*.firebaseapp.com
          https://firestore.googleapis.com
          https://identitytoolkit.googleapis.com
          https://securetoken.googleapis.com;
        worker-src 'self' blob:;
      "
    />

    <meta name="theme-color" content="#0a0a12" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DiNGo" />
    <meta name="description" content="5-in-a-row live multiplayer bingo. Challenge friends or battle the AI bot." />

    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>" />

    <title>DiNGo — Live Multiplayer Bingo</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
